<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MedPrecision - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f1f1f1",
                        "on-surface": "#1a1c1c",
                        "on-secondary-fixed-variant": "#3d4855",
                        "background": "#f9f9f9",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "primary-container": "#0078d7",
                        "on-tertiary-container": "#0e0300",
                        "secondary": "#545f6e",
                        "on-surface-variant": "#414752",
                        "tertiary-fixed-dim": "#ffb68b",
                        "outline": "#717784",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d4e3ff",
                        "on-primary-container": "#000510",
                        "on-tertiary-fixed": "#321300",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-tertiary-fixed-variant": "#753400",
                        "tertiary": "#994700",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#a4c9ff",
                        "surface-variant": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "primary": "#005fac",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary-fixed": "#ffdbc8",
                        "secondary-fixed": "#d8e3f5",
                        "surface-tint": "#005fad",
                        "on-secondary-container": "#5a6574",
                        "on-primary-fixed": "#001c39",
                        "on-error-container": "#93000a",
                        "secondary-container": "#d8e3f5",
                        "tertiary-container": "#bf5a00",
                        "on-secondary-fixed": "#111c29",
                        "outline-variant": "#c0c7d4",
                        "surface-bright": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "secondary-fixed-dim": "#bcc7d8",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed-variant": "#004884",
                        "surface-container-high": "#e8e8e8",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-container": "#eeeeee"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Inter"
                        ],
                        "body": [
                            "Inter"
                        ],
                        "label": [
                            "Inter"
                        ]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface h-screen w-full flex items-center justify-center antialiased">
<!-- Login Container -->
<main class="w-full max-w-[360px] mx-auto px-4 sm:px-0">
    <!-- Tonal Nesting: Lowest container on Surface -->
    <div class="bg-surface-container-lowest rounded shadow-[0_12px_32px_rgba(26,28,28,0.06)] p-8">
        <!-- Header Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded bg-surface-container-high mb-4">
                <span class="material-symbols-outlined text-primary text-2xl" data-icon="health_and_safety">health_and_safety</span>
            </div>
            <h1 class="font-headline text-2xl font-black text-on-surface tracking-tighter">MedPrecision</h1>
            <p class="font-label text-sm text-on-surface-variant mt-1">Clinical Operations Portal</p>
        </div>
        <!-- Form Section -->
        <form class="flex flex-col gap-6">
            <!-- Username Input -->
            <div class="flex flex-col gap-1">
                <label class="font-label text-[11px] font-semibold text-on-surface-variant tracking-[0.05em] uppercase"
                       for="username">Username</label>
                <input class="bg-surface-container-low border-0 border-b border-outline-variant/20 px-3 py-2.5 text-sm text-on-surface rounded-t rounded-b-none focus:ring-0 focus:border-b-2 focus:border-b-primary focus:bg-surface-container-high transition-all"
                       id="username" name="username" placeholder="Enter your system ID" type="text"/>
            </div>
            <!-- Password Input -->
            <div class="flex flex-col gap-1">
                <div class="flex items-center justify-between">
                    <label class="font-label text-[11px] font-semibold text-on-surface-variant tracking-[0.05em] uppercase"
                           for="password">Password</label>
                </div>
                <input class="bg-surface-container-low border-0 border-b border-outline-variant/20 px-3 py-2.5 text-sm text-on-surface rounded-t rounded-b-none focus:ring-0 focus:border-b-2 focus:border-b-primary focus:bg-surface-container-high transition-all font-mono"
                       id="password" name="password" placeholder="••••••••" type="password"/>
            </div>
            <!-- Actions -->
            <div class="mt-2 flex flex-col gap-4">
                <button class="w-full bg-gradient-to-b from-primary to-primary-container text-on-primary py-2.5 rounded font-label text-sm font-medium tracking-wide shadow-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                        type="button">
                    Sign In
                </button>
                <div class="text-center">
                    <a class="font-label text-xs font-medium text-primary hover:text-primary-container transition-colors"
                       href="#">
                        Register new terminal
                    </a>
                </div>
            </div>
        </form>
    </div>
    <!-- Utility Footer -->
    <div class="mt-8 text-center flex items-center justify-center gap-4 text-on-surface-variant font-label text-[11px] tracking-wider uppercase">
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">lock</span> Secure Connection</span>
        <span>v2.4.1</span>
    </div>
</main>
</body>
</html>
